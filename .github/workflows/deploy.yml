name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Copy index.html via scp
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 152.42.202.85
          username: root
          key: ${{ secrets.SECRETS }}
          source: "index.html"
          target: "/var/www/html"
